[program:vibetunnel]
command=/usr/local/bin/mise exec node@lts -- vibetunnel --no-auth
directory=/home/vscode
autostart=true
startsecs=5
autorestart=true
startretries=3
stderr_logfile=/var/log/vibetunnel.err.log
stdout_logfile=/var/log/vibetunnel.log
user=vscode
environment=PATH="/home/vscode/.local/bin:/usr/local/bin:/usr/bin:/bin",HOME="/home/vscode"